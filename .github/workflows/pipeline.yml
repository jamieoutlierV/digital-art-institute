name: A(DAI) Signal Pipeline

on:
  schedule:
    # Runs nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        type: boolean
        default: false
      rss_only:
        description: 'Run RSS reader only (skip signal processing)'
        required: false
        type: boolean
        default: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit inbox files, signals, graph-data.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 1: RSS reader → /inbox/ ───────────────────────────────────────
      - name: Fetch RSS feeds → inbox
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/rss_reader.py --dry-run
          else
            python scripts/rss_reader.py
          fi

      # ── Step 2: Process signals (skip if rss_only) ─────────────────────────
      - name: Process signals → /signals/
        if: ${{ !inputs.rss_only }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python pipeline/signal_processor.py --dry-run
          else
            python pipeline/signal_processor.py
          fi

      # ── Step 3: Link concepts ───────────────────────────────────────────────
      - name: Link concepts
        if: ${{ !inputs.rss_only }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python pipeline/concept_linker.py --dry-run
          else
            python pipeline/concept_linker.py
          fi

      # ── Step 4: Export graph ────────────────────────────────────────────────
      - name: Update dashboard / export graph
        if: ${{ !inputs.rss_only }}
        run: python pipeline/update_dashboard.py

      # ── Step 5: Commit all changes ──────────────────────────────────────────
      - name: Commit pipeline output
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "adai-pipeline[bot]"
          git config user.email "pipeline@digitalartsinstitute.io"
          git add inbox/ signals/ graph-data.json config/.rss-processed
          git add concepts/ practitioners/ scenes/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto: nightly pipeline $(date -u +%Y-%m-%d)"
          git push
